name: Linux Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8.0 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install GTK3 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev

      - name: Build and Publish
        run: dotnet publish app/XDM/XDM.Gtk.UI/XDM.Gtk.UI.csproj -c Release -r linux-x64 --self-contained true

      - name: Package Debian Release
        run: |
          mkdir -p deb-staging/opt/xdm
          mkdir -p deb-staging/usr/share/applications
          mkdir -p deb-staging/usr/share/pixmaps

          cp -r app/packaging/deb/DEBIAN deb-staging/
          sed -i 's/^Architecture:.*/Architecture: amd64/' deb-staging/DEBIAN/control

          cp -r app/XDM/XDM.Gtk.UI/bin/Release/*/linux-x64/publish/* deb-staging/opt/xdm/
          cp -r app/XDM/chrome-extension deb-staging/opt/xdm/

          cp -r app/packaging/deb/usr/share/applications/* deb-staging/usr/share/applications/
          sed -i 's|/opt/xdman|/opt/xdm|g' deb-staging/usr/share/applications/*.desktop
          sed -i 's|Icon=.*|Icon=xdm|g' deb-staging/usr/share/applications/*.desktop

          cp app/XDM/xdm-logo.png deb-staging/usr/share/pixmaps/xdm.png
          chmod +x deb-staging/opt/xdm/xdm-app

          dpkg-deb --build deb-staging xdm-linux-amd64.deb

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xdm-linux-amd64
          path: xdm-linux-amd64.deb

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: xdm-linux-amd64.deb
